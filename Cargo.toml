[package]
name = "fsmon"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
notify = "6.1"
clap = { version = "4.4", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
csv = "1.3"
dashmap = "5.5"
procfs = "0.16"
libc = "0.2"
anyhow = "1.0"
directories = "5.0"
dirs = "5.0"
regex = "1.10"

[profile.release]
opt-level = 3
strip = true
lto = true
