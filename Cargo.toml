[package]
name = "fsmon"
version = "0.1.3"
edition = "2024"
license = "MIT"
description = "Lightweight High-Performance File System Change Tracking Tool"
homepage = "https://github.com/lenitain/fsmon"
documentation = "https://docs.rs/fsmon"
repository = "https://github.com/lenitain/fsmon"
readme = "README.md"
keywords = ["filesystem", "monitor", "linux", "fanotify"]
categories = ["filesystem", "command-line-utilities"]
authors = ["lenitain <xt.zhu@qq.com>"]

include = [
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "README.zh-CN.md",
    "src/",
]

[dependencies]
tokio = { version = "1.35", features = ["full"] }
fanotify-rs = "0.3.1"
clap = { version = "4.4", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
csv = "1.3"
dashmap = "5.5"
procfs = "0.16"
libc = "0.2"
anyhow = "1.0"
directories = "5.0"
dirs = "5.0"
regex = "1.10"
smallvec = "1.15.1"

[profile.release]
opt-level = 3
strip = true
lto = true
