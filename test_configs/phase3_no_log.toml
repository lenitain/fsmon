# Phase 3: disable file logging + custom cache + custom socket
# Copy to ~/.config/fsmon/fsmon.toml and restart daemon
# logging section present but path omitted = file logging disabled

[monitored]
path = "~/.local/share/fsmon/monitored.jsonl"

[logging]

[socket]
path = "/tmp/fsmon_test_custom.sock"

[cache]
dir_capacity = 50000
dir_ttl_secs = 1800
file_size_capacity = 5000
proc_ttl_secs = 300
stats_interval_secs = 30
