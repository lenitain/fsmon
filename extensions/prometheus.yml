# --------------------------------------------------------------------
#
# fsmon metrics scrape target for Prometheus.
#
# Prerequisites:
#   sudo fsmon daemon --metrics-listen 127.0.0.1:9845
#
# Then add this job to your prometheus.yml scrape_configs:

scrape_configs:
  - job_name: 'fsmon'
    scrape_interval: 15s
    static_configs:
      - targets: ['127.0.0.1:9845']

