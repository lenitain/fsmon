# ====================================================================
# EXAMPLE ONLY — NOT FOR PRODUCTION USE.
# Copy and adapt to your environment before deploying.
# ====================================================================
#
# Prometheus scrape configuration for fsmon daemon.
#
# fsmon exposes metrics via TCP HTTP in Prometheus text format.
# This is NOT Prometheus-specific — any TCP consumer can scrape /metrics.
# The format follows the Prometheus exposition format (de facto standard).
#
# ── Setup ─────────────────────────────────────────────────────────
# 1. Start fsmon daemon with the TCP metrics endpoint:
#
#      sudo fsmon daemon --metrics-listen 127.0.0.1:9845
#
# 2. Add the scrape job below to your prometheus.yml (usually /etc/prometheus/prometheus.yml)
#
# 3. Restart Prometheus:
#
#      sudo systemctl reload prometheus
#
# 4. Verify targets are up: http://localhost:9090/targets
#
# ── Alternative: Socket-Based Scraping ────────────────────────────
# If you cannot add --metrics-listen, use fsmon-metrics.py as a
# custom exporter via the Unix socket:
#
#   python3 extensions/http-metrics/fsmon-metrics.py --watch 15
#
# Or write a small Prometheus exporter that wraps the socket command.
# ====================================================================

scrape_configs:
  - job_name: 'fsmon'
    scrape_interval: 15s
    static_configs:
      - targets: ['127.0.0.1:9845']

